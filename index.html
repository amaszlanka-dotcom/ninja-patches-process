<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
body{background:#0a0b0d;color:#e8eaf0;font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.card{background:#111318;border:1px solid #1e2535;border-radius:12px;padding:32px;width:320px}
h2{margin-bottom:20px;font-size:18px;color:#4caf7d}
input{width:100%;background:#161b24;border:1px solid #1e2535;border-radius:7px;padding:10px;color:#e8eaf0;font-size:14px;margin-bottom:12px;box-sizing:border-box;outline:none}
button{width:100%;padding:12px;background:#4caf7d;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.err{color:#ff4757;font-size:13px;margin-bottom:10px;display:none;padding:8px;background:#ff475715;border-radius:6px}
.err.show{display:block}
#app{display:none;text-align:center;padding:20px}
#app h2{color:#4caf7d}
#app p{color:#b0bbcc;margin:10px 0}
.out-btn{width:auto;padding:8px 20px;margin-top:16px}
</style>
</head>
<body>
<div id="login-box" class="card">
  <h2>Ninja Patches</h2>
  <input id="u" type="text" placeholder="Username" onkeydown="if(event.key==='Enter')login()"/>
  <input id="p" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')login()"/>
  <div class="err" id="err">Wrong username or password.</div>
  <button onclick="login()">Sign In</button>
</div>
<div id="app" class="card">
  <h2>Login works!</h2>
  <p id="who"></p>
  <p style="font-size:12px;color:#6b7a99">If you can see this, the login system is working correctly.</p>
  <button class="out-btn" onclick="logout()">Logout</button>
</div>
<script>
var CREDS = {
  admin: { user: 'admin', pass: 'ninja2025' },
  agent: { user: 'agent', pass: 'patches2025' }
};
function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  var err = document.getElementById('err');
  err.classList.remove('show');
  var role = null;
  if (u === CREDS.admin.user && p === CREDS.admin.pass) role = 'Admin';
  else if (u === CREDS.agent.user && p === CREDS.agent.pass) role = 'Agent';
  if (role) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('who').textContent = 'Logged in as: ' + role + ' (' + u + ')';
  } else {
    err.classList.add('show');
  }
}
function logout() {
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('app').style.display = 'none';
  document.getElementById('u').value = '';
  document.getElementById('p').value = '';
}
</script>
</body>
</html>
